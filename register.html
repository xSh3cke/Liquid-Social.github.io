<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - Liquid Social</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-large">
                    <i class="fas fa-droplet"></i>
                    <h1>Liquid Social</h1>
                </div>
                <p>Crea tu cuenta gratis</p>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="Nombre de usuario" required>
                    <small class="input-hint">@usuario - solo letras, números y guión bajo</small>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Contraseña" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Confirmar contraseña" required>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Registrarse</button>
                
                <div class="divider">
                    <span>o regístrate con</span>
                </div>
                
                <button type="button" class="btn-google" id="googleRegisterBtn">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                
                <div class="terms">
                    <label>
                        <input type="checkbox" id="acceptTerms" required>
                        Acepto los <a href="#" id="termsLink">Términos y Condiciones</a> y la 
                        <a href="#" id="privacyLink">Política de Privacidad</a>
                    </label>
                </div>
            </form>
            
            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
        
        <div class="auth-info">
            <div class="info-content">
                <div class="feature-highlight">
                    <i class="fas fa-chart-line"></i>
                    <div>
                        <h4>+1M</h4>
                        <p>Usuarios activos</p>
                    </div>
                </div>
                <div class="feature-highlight">
                    <i class="fas fa-globe"></i>
                    <div>
                        <h4>150+</h4>
                        <p>Países</p>
                    </div>
                </div>
                <div class="feature-highlight">
                    <i class="fas fa-rocket"></i>
                    <div>
                        <h4>24/7</h4>
                        <p>Soporte activo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
