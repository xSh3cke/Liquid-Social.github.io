<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LiquidNexus Pro · Red Social</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    :root {
      --bg: #060a14;
      --glass: rgba(18, 22, 36, 0.55);
      --border: rgba(255, 255, 255, 0.07);
      --highlight: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text2: rgba(255, 255, 255, 0.7);
      --text3: rgba(255, 255, 255, 0.45);
      --accent: #5e9eff;
      --accent2: rgba(94, 158, 255, 0.2);
      --danger: #ff5e7a;
      --success: #34e0a1;
      --warning: #ffb347;
      --radius: 26px;
      --radius2: 18px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 5%, rgba(94,158,255,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 85%, rgba(94,158,255,0.06) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.2rem;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 750px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; flex: 1; }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px rgba(0,0,0,0.55), inset 0 1px 0 var(--highlight);
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: '';
      position: absolute;
      top: -30%; right: -20%;
      width: 60%; height: 160%;
      background: radial-gradient(circle, rgba(94,158,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0; transition: 0.5s;
    }

    .glass:hover::before { opacity: 1; }
    .glass:hover { border-color: rgba(255,255,255,0.12); }

    button, .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 0.55rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      backdrop-filter: blur(15px);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    button:hover, .btn:hover {
      background: var(--accent2);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 25px rgba(94,158,255,0.3);
    }

    button:active, .btn:active { transform: scale(0.97); }

    .btn-primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    .btn-danger { background: rgba(255,94,122,0.2); border-color: var(--danger); color: var(--danger); }
    .btn-sm { padding: 0.35rem 0.9rem; font-size: 0.78rem; }
    .btn-xs { padding: 0.25rem 0.7rem; font-size: 0.7rem; }

    input, textarea {
      background: rgba(10,14,24,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 0.65rem 1rem;
      color: white;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: 0.2s;
      font-family: var(--font);
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(94,158,255,0.15);
    }

    .hidden { display: none !important; }
    .fade-in { animation: fadeUp 0.3s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .material-icons-round { font-size: 1.3rem; vertical-align: middle; }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 2.5rem; }
    .toggle-password {
      position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%);
      background: transparent; border: none; color: var(--text3); cursor: pointer; padding: 0.2rem;
    }

    .auth-container { max-width: 480px; margin: 2rem auto; width: 100%; }
    .auth-tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
    .auth-tab {
      flex: 1; text-align: center; padding: 0.7rem; border-radius: 20px; cursor: pointer;
      font-weight: 500; transition: 0.2s; background: rgba(255,255,255,0.03); border: 1px solid transparent;
    }
    .auth-tab.active { background: var(--accent); border-color: var(--accent); }

    .password-strength { display: flex; gap: 0.3rem; margin: 0.4rem 0; align-items: center; }
    .strength-bar { height: 4px; flex: 1; border-radius: 4px; background: rgba(255,255,255,0.1); transition: 0.3s; }
    .strength-bar.active:nth-child(1) { background: #ff5e7a; }
    .strength-bar.active:nth-child(2) { background: #ff5e7a; }
    .strength-bar.active:nth-child(3) { background: #ffb347; }
    .strength-bar.active:nth-child(4) { background: #ffb347; }
    .strength-bar.active:nth-child(5) { background: #34e0a1; }
    .strength-label { font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem; }
    .strength-label.debil { color: #ff5e7a; }
    .strength-label.medio { color: #ff8c42; }
    .strength-label.intermedio { color: #ffb347; }
    .strength-label.dificil { color: #ffb347; }
    .strength-label.seguro { color: #34e0a1; }

    .username-suggestions { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.3rem 0; }
    .username-suggestion {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 0.2rem 0.6rem; border-radius: 15px; font-size: 0.75rem; cursor: pointer;
      transition: 0.2s; color: var(--text2);
    }
    .username-suggestion:hover { background: var(--accent2); border-color: var(--accent); color: white; }

    .remember-row {
      display: flex; align-items: center; gap: 0.4rem;
      margin: 0.5rem 0; font-size: 0.85rem; color: var(--text2);
    }
    .remember-row input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); }

    .spinner {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 2rem; padding: 1.2rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem; font-size: 0.8rem; color: var(--text3);
    }
    .footer a { color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }

    .topbar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: space-between; padding: 1.8rem 2rem; }
    .topbar-left { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(94,158,255,0.3), rgba(255,255,255,0.05));
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.3rem; overflow: hidden; flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-lg { width: 85px; height: 85px; font-size: 2.2rem; }
    .avatar-sm { width: 30px; height: 30px; font-size: 0.8rem; }
    .avatar-xs { width: 24px; height: 24px; font-size: 0.7rem; }
    .topbar-info { display: flex; flex-direction: column; gap: 0.3rem; }
    .topbar-name { font-size: 1.2rem; font-weight: 600; }
    .topbar-username { color: var(--text2); font-size: 0.85rem; }
    .topbar-bio { color: var(--text3); font-size: 0.8rem; max-width: 300px; line-height: 1.3; }
    .topbar-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.2rem; }
    .topbar-stat { display: flex; flex-direction: column; align-items: center; gap: 0.1rem; }
    .topbar-stat-value { font-weight: 700; font-size: 1.1rem; }
    .topbar-stat-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.03em; }
    .tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tab {
      background: rgba(255,255,255,0.03); border: 1px solid transparent; padding: 0.5rem 1.1rem;
      border-radius: 30px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-weight: 500;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); }
    .post {
      background: rgba(20,24,38,0.4); backdrop-filter: blur(35px); border-radius: var(--radius2);
      border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1.2rem; position: relative;
    }
    .post-options-btn { position: absolute; top: 0.8rem; right: 0.8rem; background: transparent; border: none; color: var(--text3); cursor: pointer; padding: 0.3rem; border-radius: 50%; transition: 0.2s; z-index: 5; }
    .post-options-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .post-options-menu {
      position: absolute; top: 2.5rem; right: 0.8rem; background: rgba(20,24,38,0.98);
      backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 14px;
      padding: 0.4rem; z-index: 10; display: none; flex-direction: column; gap: 0.2rem;
      min-width: 140px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }
    .post-options-menu.show { display: flex; }
    .post-option-item {
      background: transparent; border: none; color: var(--text2); padding: 0.5rem 0.8rem;
      border-radius: 10px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center;
      gap: 0.4rem; transition: 0.2s; width: 100%; text-align: left;
    }
    .post-option-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .post-option-item.danger { color: var(--danger); }
    .post-option-item.danger:hover { background: rgba(255,94,122,0.15); }
    .post-media { margin: 0.7rem 0; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
    .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; display: block; }
    .follow-btn {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 0.25rem 0.8rem; font-size: 0.75rem; border-radius: 20px; cursor: pointer; transition: 0.2s;
    }
    .follow-btn.following { background: var(--accent); color: white; }
    .author-badge { background: var(--accent); color: white; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 10px; margin-left: 0.3rem; }
    .first-comment-badge { background: var(--warning); color: #000; font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 8px; margin-left: 0.3rem; font-weight: 600; }
    .comment-item { display: flex; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .floating-buttons { position: fixed; bottom: 2.2rem; right: 2.2rem; z-index: 999; display: flex; flex-direction: column; gap: 0.8rem; }
    .fab-circle {
      width: 58px; height: 58px; border-radius: 50%; border: none; color: white;
      cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .fab-circle:hover { transform: scale(1.08); }
    .fab-circle:active { transform: scale(0.95); }
    .fab-chat { background: var(--success); box-shadow: 0 15px 35px rgba(52,224,161,0.4); }
    .fab-post { background: var(--accent); box-shadow: 0 15px 35px rgba(94,158,255,0.5); }
    .fab-circle .material-icons-round { font-size: 1.8rem; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--glass); backdrop-filter: blur(60px); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 1.8rem; max-width: 520px; width: 92%;
      max-height: 85vh; overflow-y: auto;
    }
    .file-preview {
      max-width: 100%; max-height: 200px; border-radius: 12px; margin: 0.5rem 0; object-fit: cover;
    }

    @media (max-width: 500px) {
      .glass { padding: 1rem; }
      .topbar { padding: 1.2rem; }
      .floating-buttons { bottom: 1.2rem; right: 1.2rem; gap: 0.6rem; }
      .fab-circle { width: 50px; height: 50px; }
      .fab-circle .material-icons-round { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app" id="appContainer"></div>
  <div class="floating-buttons" id="floatingButtons" style="display:none;">
    <button class="fab-circle fab-chat" id="fabChatBtn" title="Chats"><span class="material-icons-round">chat_bubble</span></button>
    <button class="fab-circle fab-post" id="fabPostBtn" title="Nueva publicacion"><span class="material-icons-round">edit</span></button>
  </div>
  <footer class="footer glass" id="mainFooter" style="display:none;">
    <span>&copy; 2026 LiquidNexus Pro. Todos los derechos reservados.</span>
    <a href="https://discord.com" target="_blank" rel="noopener">
      <span class="material-icons-round">discord</span> Discord
    </a>
  </footer>

  <script>
  (function() {
    // ========== CONFIGURACIÓN DE EMAILJS ==========
    const EMAILJS_CONFIG = {
      publicKey: 'R0J-_Fpwd_DUmfZm4',
      serviceId: 'service_ccxi4ib',
      templateId: 'template_p28280j',
    };

    // Inicializar EmailJS
    (function() {
      if (EMAILJS_CONFIG.publicKey) {
        emailjs.init(EMAILJS_CONFIG.publicKey);
      }
    })();

    async function sendWelcomeEmail(email, username, displayName, password, createdAt) {
      try {
        const templateParams = {
          to_email: email,
          username: username,
          display_name: displayName,
          password: password,
          created_at: createdAt,
        };

        const response = await emailjs.send(
          EMAILJS_CONFIG.serviceId,
          EMAILJS_CONFIG.templateId,
          templateParams
        );

        console.log('Correo enviado exitosamente:', response);
        return { success: true, response };
      } catch (error) {
        console.error('Error al enviar correo:', error);
        
        // Respaldo: abrir cliente de correo
        const subject = encodeURIComponent('Bienvenido a LiquidNexus Pro - Datos de tu cuenta');
        const body = encodeURIComponent(
          `¡Bienvenido a LiquidNexus Pro!\n\n` +
          `Tus datos de acceso:\n` +
          `Usuario: ${username}\n` +
          `Contraseña: ${password}\n` +
          `Email: ${email}\n` +
          `Fecha de creación: ${createdAt}\n\n` +
          `Guarda esta información de forma segura.\n\n` +
          `© 2026 LiquidNexus Pro`
        );
        
        window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_blank');
        
        return { success: true, fallback: true };
      }
    }

    const DB = {
      users: JSON.parse(localStorage.getItem('ln12_users')) || {},
      posts: JSON.parse(localStorage.getItem('ln12_posts')) || [],
      messages: JSON.parse(localStorage.getItem('ln12_msgs')) || {},
      ipRegistry: JSON.parse(localStorage.getItem('ln12_ips')) || {},
      currentUser: JSON.parse(localStorage.getItem('ln12_session')) || null,
      save(k) { try { localStorage.setItem('ln12_'+k, JSON.stringify(this[k])); } catch(e) {} }
    };

    function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,8); }
    function getUser(id) { return DB.users[id]; }
    function findByUsername(un) { return Object.values(DB.users).find(u => u.username?.toLowerCase() === un?.toLowerCase()); }
    function findByEmail(em) { return Object.values(DB.users).find(u => u.email?.toLowerCase() === em?.toLowerCase()); }

    function getSimulatedIP() {
      let ip = localStorage.getItem('ln12_sim_ip');
      if (!ip) { ip = '192.168.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255); localStorage.setItem('ln12_sim_ip', ip); }
      return ip;
    }

    function fileToBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.post-options-btn') && !e.target.closest('.post-options-menu')) {
        document.querySelectorAll('.post-options-menu.show').forEach(m => m.classList.remove('show'));
      }
    });

    const app = document.getElementById('appContainer');
    const floatingButtons = document.getElementById('floatingButtons');
    const mainFooter = document.getElementById('mainFooter');
    let currentTab = 'feed';

    function renderApp() {
      if (!DB.currentUser || !DB.users[DB.currentUser]) {
        floatingButtons.style.display = 'none';
        mainFooter.style.display = 'none';
        renderAuth();
      } else {
        floatingButtons.style.display = 'flex';
        mainFooter.style.display = 'flex';
        renderMain();
      }
    }

    // ========== AUTH ==========
    function renderAuth() {
      app.innerHTML = `
        <div class="auth-container">
          <div class="glass" style="text-align:center;">
            <h2 style="font-size:2rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
              <span class="material-icons-round" style="font-size:2.5rem;">water_drop</span> LiquidNexus Pro
            </h2>
            <p style="color:var(--text2);margin-bottom:1rem;">Red social profesional</p>
            <div class="auth-tabs">
              <div class="auth-tab active" data-auth="login">Iniciar sesión</div>
              <div class="auth-tab" data-auth="register">Crear cuenta</div>
            </div>
            <div id="authForms">${renderLoginForm()}</div>
          </div>
        </div>
      `;

      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.onclick = function() {
          document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          document.getElementById('authForms').innerHTML = this.dataset.auth === 'login' ? renderLoginForm() : renderRegisterForm();
          bindAuthEvents();
        };
      });
      bindAuthEvents();
    }

    function renderLoginForm() {
      return `
        <div id="loginForm">
          <input id="liUser" placeholder="Usuario, email o ID" style="margin:0.4rem 0;">
          <div class="password-wrapper">
            <input id="liPass" type="password" placeholder="Contraseña">
            <button class="toggle-password" type="button" data-target="liPass">
              <span class="material-icons-round">visibility_off</span>
            </button>
          </div>
          <div class="remember-row">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Recordarme</label>
          </div>
          <button id="liBtn" class="btn-primary" style="width:100%;">Iniciar sesión</button>
        </div>
      `;
    }

    function renderRegisterForm() {
      return `
        <div id="registerForm">
          <input id="rgEmail" type="email" placeholder="tu@gmail.com" style="margin-bottom:0.4rem;">
          <input id="rgUser" placeholder="usuario_ejemplo" maxlength="20">
          <div class="username-suggestions" id="usernameSuggestions"></div>
          <input id="rgName" placeholder="Nombre público" style="margin:0.4rem 0;">
          <div class="password-wrapper">
            <input id="rgPass" type="password" placeholder="Mínimo 12 caracteres" minlength="12">
            <button class="toggle-password" type="button" data-target="rgPass">
              <span class="material-icons-round">visibility_off</span>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div>
            <div class="strength-bar"></div><div class="strength-bar"></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
          <button id="rgBtn" class="btn-primary" style="width:100%;margin-top:0.8rem;">Crear cuenta</button>
          <div id="emailStatus" style="margin-top:0.5rem; font-size:0.8rem; color:var(--text3);"></div>
        </div>
      `;
    }

    function bindAuthEvents() {
      document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.onclick = function() {
          const input = document.getElementById(this.dataset.target);
          const icon = this.querySelector('.material-icons-round');
          if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility';
          } else {
            input.type = 'password';
            icon.textContent = 'visibility_off';
          }
        };
      });

      const liBtn = document.getElementById('liBtn');
      if (liBtn) {
        liBtn.onclick = () => {
          const u = document.getElementById('liUser').value.trim();
          const p = document.getElementById('liPass').value;
          if (!u || !p) return alert('Completa todos los campos');
          const user = findByUsername(u) || findByEmail(u) || getUser(u);
          if (user && user.password === p) {
            DB.currentUser = user.id;
            DB.save('session');
            if (document.getElementById('rememberMe')?.checked) {
              localStorage.setItem('ln12_remember', JSON.stringify({ username: user.username, password: p }));
            } else {
              localStorage.removeItem('ln12_remember');
            }
            renderApp();
          } else alert('Credenciales incorrectas');
        };
      }

      const rgUser = document.getElementById('rgUser');
      const rgPass = document.getElementById('rgPass');
      const rgBtn = document.getElementById('rgBtn');

      if (rgUser) rgUser.addEventListener('input', () => updateUsernameSuggestions(rgUser.value));
      if (rgPass) rgPass.addEventListener('input', () => updatePasswordStrength(rgPass.value));

      if (rgBtn) {
        rgBtn.onclick = async function() {
          const email = document.getElementById('rgEmail').value.trim();
          const username = document.getElementById('rgUser').value.trim();
          const displayName = document.getElementById('rgName').value.trim();
          const password = document.getElementById('rgPass').value;
          const ip = getSimulatedIP();
          const accountsOnIP = DB.ipRegistry[ip] || 0;
          const statusDiv = document.getElementById('emailStatus');

          if (!email || !username || !displayName || !password) return alert('Completa todos los campos');
          
          const gmailRegex = /^[a-zA-Z0-9._%+-]+@(gmail|googlemail)\.com$/i;
          if (!gmailRegex.test(email)) {
            return alert('Solo se permiten correos de Gmail válidos (@gmail.com o @googlemail.com)');
          }
          
          if (username.length < 2 || username.length > 20) return alert('Usuario entre 2-20 caracteres');
          if (!/^[a-zA-Z0-9_]+$/.test(username)) return alert('Solo letras, números y guiones bajos');
          if (password.length < 12) return alert('Contraseña mínimo 12 caracteres');
          if (findByUsername(username)) return alert('Nombre de usuario ya existe');
          if (findByEmail(email)) return alert('Email ya registrado');
          if (accountsOnIP >= 2) return alert('Límite de 2 cuentas por IP');

          const strength = getPasswordStrength(password);
          if (strength.level < 3 && !confirm(`Contraseña ${strength.label}. ¿Continuar?`)) return;

          // Deshabilitar botón y mostrar estado
          rgBtn.disabled = true;
          rgBtn.innerHTML = '<span class="spinner"></span> Creando cuenta...';
          statusDiv.textContent = 'Enviando correo de confirmación...';

          const id = uid();
          const createdAt = new Date().toLocaleString('es-ES', { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
          });

          DB.users[id] = {
            id, username, email, displayName, password,
            bio: 'Hola, estoy en LiquidNexus Pro',
            avatar: displayName[0].toUpperCase(), avatarType: 'text',
            friends: [], following: [], followers: [],
            joined: Date.now(), createdAt: new Date().toISOString()
          };
          DB.ipRegistry[ip] = (DB.ipRegistry[ip] || 0) + 1;
          DB.save('users'); DB.save('ips');

          // Enviar correo real con EmailJS
          const emailResult = await sendWelcomeEmail(email, username, displayName, password, createdAt);

          rgBtn.disabled = false;
          rgBtn.innerHTML = 'Crear cuenta';

          if (emailResult.success) {
            alert('¡Cuenta creada exitosamente!\n\nSe ha enviado un correo con tus datos de acceso a: ' + email + '\n\nRevisa tu bandeja de entrada (y spam) para ver el correo.\n\nAhora inicia sesión.');
            
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-auth="login"]').classList.add('active');
            document.getElementById('authForms').innerHTML = renderLoginForm();
            bindAuthEvents();
          } else {
            statusDiv.textContent = 'Error al enviar el correo, pero la cuenta fue creada.';
            alert('Cuenta creada pero hubo un problema al enviar el correo.\n\nTus datos son:\nUsuario: ' + username + '\nContraseña: ' + password + '\n\nGuárdalos de forma segura.');
            
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-auth="login"]').classList.add('active');
            document.getElementById('authForms').innerHTML = renderLoginForm();
            bindAuthEvents();
          }
        };
      }

      const saved = JSON.parse(localStorage.getItem('ln12_remember') || '{}');
      const liUser = document.getElementById('liUser');
      const liPass = document.getElementById('liPass');
      const remember = document.getElementById('rememberMe');
      if (saved.username && liUser) {
        liUser.value = saved.username || '';
        if (saved.password && liPass) liPass.value = saved.password || '';
        if (remember) remember.checked = true;
      }
    }

    function updateUsernameSuggestions(value) {
      const container = document.getElementById('usernameSuggestions');
      if (!container) return;
      const base = value.replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
      if (base.length < 2) { container.innerHTML = ''; return; }
      if (findByUsername(base)) {
        const suggestions = [
          base + '_' + Math.floor(Math.random()*100),
          base + Math.floor(Math.random()*1000),
          base + '_oficial',
          base + '_pro'
        ];
        container.innerHTML = '<small style="color:var(--warning);">No disponible. Sugerencias:</small>' +
          suggestions.map(s => `<span class="username-suggestion">${s}</span>`).join('');
      } else {
        container.innerHTML = '<small style="color:var(--success);">Disponible</small>';
      }
      container.querySelectorAll('.username-suggestion').forEach(s => {
        s.onclick = () => {
          document.getElementById('rgUser').value = s.textContent;
          container.innerHTML = '<small style="color:var(--success);">Disponible</small>';
        };
      });
    }

    function getPasswordStrength(password) {
      let score = 0;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      const levels = ['debil','debil','medio','intermedio','dificil','seguro'];
      return { level: Math.min(score,5), label: levels[Math.min(score,5)] };
    }

    function updatePasswordStrength(password) {
      const container = document.getElementById('passwordStrength');
      const label = document.getElementById('strengthLabel');
      if (!container || !label) return;
      const { level, label: text } = getPasswordStrength(password);
      container.querySelectorAll('.strength-bar').forEach((bar,i) => bar.classList.toggle('active', i<level));
      label.textContent = text.charAt(0).toUpperCase() + text.slice(1);
      label.className = 'strength-label ' + text;
    }

    function switchTab(tab) {
      currentTab = tab;
      const content = document.getElementById('tabContent');
      if (!content) return;
      content.innerHTML = '';
      switch(tab) {
        case 'feed': renderFeed(content); break;
        case 'friends': renderFriends(content); break;

      }

    function renderMediaHTML(media) {
      if (!media?.length) return '';
      return media.map(m => {
        switch(m.type) {
          case 'image': return `<div class="post-media"><img src="${m.url}" loading="lazy" onerror="this.remove();"></div>`;
          case 'video': return `<div class="post-media"><video controls><source src="${m.url}"></video></div>`;
          case 'youtube':
            const v = m.url.split('v=')[1]?.split('&')[0] || m.url.split('/').pop();
            return `<div class="post-media"><iframe width="100%" height="250" src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe></div>`;
          case 'gif': return `<div class="post-media"><img src="${m.url}"></div>`;
          default: return '';
        }
      }).join('');
    }

    function renderFeed(container) {
      const user = DB.users[DB.currentUser];
      const posts = DB.posts.filter(p => p.authorId === user.id || user.following.includes(p.authorId))
                    .sort((a,b) => b.timestamp - a.timestamp);

      if (posts.length === 0) {
        container.innerHTML = '<div class="glass" style="text-align:center;padding:3rem;color:var(--text3);">No hay publicaciones. Sigue a mas personas o crea tu primer post.</div>';
        return;

      const postsHTML = posts.map(p => {
        const author = getUser(p.authorId) || { displayName: 'Usuario', avatar: '?', avatarType: 'text', username: 'unknown' };
        const isOwn = p.authorId === user.id;

              <button class="post-options-btn" data-post-id="${p.id}"><span class="material-icons-round">more_vert</span></button>

                <strong>${author.displayName}</strong> ${isOwn ? '<span class="author-badge">Autor</span>' : ''}

              </span>
              <span class="comment-btn-click" data-pid="${p.id}" style="cursor:pointer;display:flex;align-items:center;gap:0.3rem;color:var(--text3);">
                <span class="material-icons-round" style="font-size:1.2rem;pointer-events:none;">chat_bubble_outline</span>
                <small>${p.comments.length}</small>
              </span>
            </div>
            ${p.comments.slice(-2).map(c => {
              const cu = getUser(c.userId) || { displayName: '?', avatar: '?', avatarType: 'text' };
              return `
                <div style="display:flex;align-items:flex-start;gap:0.4rem;margin-top:0.4rem;background:rgba(255,255,255,0.02);border-radius:10px;padding:0.4rem 0.6rem;">
                  <div class="avatar avatar-xs">${cu.avatarType === 'image' ? `<img src="${cu.avatar}" alt="avatar">` : cu.avatar}</div>
                  <div style="flex:1;">
                    <strong style="font-size:0.8rem;">${cu.displayName}</strong>
                    ${c.userId === p.authorId ? '<span class="author-badge">Autor</span>' : ''}

                    <p style="font-size:0.8rem;color:var(--text2);margin:0.1rem 0;">${c.text}</p>
                  </div>
                </div>`;
            }).join('')}
            ${p.comments.length > 2 ? `<small class="comment-btn-click" data-pid="${p.id}" style="color:var(--accent);cursor:pointer;display:block;margin-top:0.3rem;">Ver ${p.comments.length} comentarios</small>` : ''}
            <div style="display:flex;gap:0.4rem;margin-top:0.5rem;">
              <input class="quick-comment-input" data-pid="${p.id}" placeholder="Comentar..." style="font-size:0.78rem;padding:0.4rem;">

                <span class="material-icons-round" style="font-size:1rem;">send</span>
              </button>

          </div>

      container.innerHTML = '<div id="postsContainer">' + postsHTML + '</div>';

      container.onclick = function(e) {
        const target = e.target;
        if (target.closest('.quick-comment-btn')) {
          e.preventDefault();
          const pid = target.closest('.quick-comment-btn').dataset.pid;
          const input = container.querySelector(`.quick-comment-input[data-pid="${pid}"]`);
          if (!input) return;
          const text = input.value.trim();
          if (!text) return;
          const post = DB.posts.find(p => p.id === pid);
          if (!post) return;
          if (!post.comments) post.comments = [];
          post.comments.push({ id: uid(), userId: DB.currentUser, text, time: Date.now(), likes: [] });
          DB.save('posts');
          input.value = '';
          switchTab('feed');
          return;
        }
        if (target.closest('.post-options-btn')) {
          e.stopPropagation();
          const postId = target.closest('.post-options-btn').dataset.postId;
          const menu = container.querySelector(`.post-options-menu[data-post-id="${postId}"]`);
          if (menu) {
            const isOpen = menu.classList.contains('show');
            document.querySelectorAll('.post-options-menu.show').forEach(m => m.classList.remove('show'));
            if (!isOpen) menu.classList.add('show');
          }
          return;
        }
        if (target.closest('.edit-post-btn')) {
          document.querySelectorAll('.post-options-menu.show').forEach(m => m.classList.remove('show'));
          openEditPostModal(target.closest('.edit-post-btn').dataset.postId);
          return;
        }
        if (target.closest('.delete-post-btn')) {
          document.querySelectorAll('.post-options-menu.show').forEach(m => m.classList.remove('show'));
          const postId = target.closest('.delete-post-btn').dataset.postId;
          if (confirm('Eliminar esta publicacion?')) {
            DB.posts = DB.posts.filter(p => p.id !== postId);
            DB.save('posts');
            switchTab('feed');
          }
          return;
        }
        if (target.closest('.like-btn')) {
          const pid = target.closest('.like-btn').dataset.pid;
          const post = DB.posts.find(p => p.id === pid);
          if (!post) return;
          const idx = post.likes.indexOf(DB.currentUser);
          if (idx > -1) post.likes.splice(idx, 1);
          else post.likes.push(DB.currentUser);
          DB.save('posts');
          switchTab('feed');
          return;
        }
        if (target.closest('.follow-btn')) {
          toggleFollow(target.closest('.follow-btn').dataset.uid);
          switchTab('feed');
          return;
        }
        if (target.closest('.comment-btn-click')) {
          openCommentsModal(target.closest('.comment-btn-click').dataset.pid);
          return;
        }
      };
    }

    function toggleFollow(targetId) {
      const user = DB.users[DB.currentUser];
      const target = getUser(targetId);
      if (!target || target.id === user.id) return;
      if (user.following.includes(targetId)) {
        user.following = user.following.filter(id => id !== targetId);
        target.followers = target.followers.filter(id => id !== user.id);
      } else {
        user.following.push(targetId);
        target.followers.push(user.id);
      }
      DB.users[user.id] = user;
      DB.users[targetId] = target;
      DB.save('users');
    }

      document.body.appendChild(overlay);
      let mediaType = null, mediaData = null;
      const fileInput = overlay.querySelector('#fileInput');
      const preview = overlay.querySelector('#previewContainer');
      const youtubeUrl = overlay.querySelector('#youtubeUrl');
      const gifUrl = overlay.querySelector('#gifUrl');
      overlay.querySelector('#uploadPhotoBtn').onclick = () => { fileInput.accept = 'image/*'; fileInput.click(); };
      overlay.querySelector('#uploadVideoBtn').onclick = () => { fileInput.accept = 'video/*'; fileInput.click(); };
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const isVideo = file.type.startsWith('video');
        mediaType = isVideo ? 'video' : 'image';
        mediaData = await fileToBase64(file);
        preview.innerHTML = isVideo ? `<video controls class="file-preview"><source src="${mediaData}"></video>` : `<img src="${mediaData}" class="file-preview">`;
        youtubeUrl.classList.add('hidden'); gifUrl.classList.add('hidden');
      };
      overlay.querySelector('#addYoutubeBtn').onclick = () => {
        youtubeUrl.classList.remove('hidden'); gifUrl.classList.add('hidden');
        preview.innerHTML = ''; mediaType = 'youtube'; fileInput.value = '';
      };
      overlay.querySelector('#addGifBtn').onclick = () => {
        gifUrl.classList.remove('hidden'); youtubeUrl.classList.add('hidden');
        preview.innerHTML = ''; mediaType = 'gif'; fileInput.value = '';
      };
      overlay.querySelector('#cancelPostBtn').onclick = () => overlay.remove();
      overlay.querySelector('#publishBtn').onclick = () => {
        const content = overlay.querySelector('#postContent').value.trim();
        let media = [];
        if (mediaType === 'youtube' && youtubeUrl.value.trim()) media = [{ type: 'youtube', url: youtubeUrl.value.trim() }];
        else if (mediaType === 'gif' && gifUrl.value.trim()) media = [{ type: 'gif', url: gifUrl.value.trim() }];
        else if ((mediaType === 'image' || mediaType === 'video') && mediaData) media = [{ type: mediaType, url: mediaData }];
        if (!content && media.length === 0) return alert('Anade contenido');
        DB.posts.unshift({ id: uid(), authorId: DB.currentUser, content, media, timestamp: Date.now(), likes: [], comments: [] });
        DB.save('posts');
        overlay.remove();
        switchTab('feed');
      };
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }

    function openChatPanel() {
      const user = DB.users[DB.currentUser];
      const friends = user.friends.map(id => getUser(id)).filter(Boolean);
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h3><span class="material-icons-round">chat_bubble</span> Chats</h3>
          <div style="max-height:300px;overflow-y:auto;margin:0.8rem 0;">
            ${friends.map(f => `
              <div data-fid="${f.id}" style="display:flex;align-items:center;gap:0.6rem;padding:0.6rem;cursor:pointer;border-radius:12px;"
                   onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background='transparent'">
                <div class="avatar avatar-sm">${f.avatarType==='image'?`<img src="${f.avatar}">`:f.avatar}</div>
                <div><strong>${f.displayName}</strong><small style="display:block;color:var(--text3);">@${f.username}</small></div>
              </div>
            `).join('') || '<p style="color:var(--text3);">No tienes amigos aun.</p>'}
          </div>
          <button id="closeChatPanel" class="btn-sm">Cerrar</button>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#closeChatPanel').onclick = () => overlay.remove();
      overlay.querySelectorAll('[data-fid]').forEach(el => {
        el.onclick = () => { overlay.remove(); openQuickChat(el.dataset.fid); };
      });
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }

    function openQuickChat(friendId) {
      const user = DB.users[DB.currentUser];
      const friend = getUser(friendId);
      if (!friend) return;
      const key = [user.id, friendId].sort().join('_');
      if (!DB.messages[key]) DB.messages[key] = [];
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.8rem;">
            <div class="avatar">${friend.avatarType==='image'?`<img src="${friend.avatar}">`:friend.avatar}</div>
            <h3>${friend.displayName}</h3>
          </div>
          <div id="quickMsgBox" style="max-height:280px;overflow-y:auto;margin:0.5rem 0;"></div>
          <div style="display:flex;gap:0.4rem;">
            <input id="quickMsgInput" placeholder="Mensaje...">
            <button id="quickSendMsg" class="btn-primary btn-sm"><span class="material-icons-round">send</span></button>
          </div>
          <div style="display:flex;gap:0.4rem;margin-top:0.4rem;">
            <button id="sendPhotoBtn" class="btn-xs"><span class="material-icons-round">image</span> Foto</button>
            <button id="sendVideoBtn" class="btn-xs"><span class="material-icons-round">videocam</span> Video</button>
          </div>
          <input type="file" id="chatFileInput" accept="image/*,video/*" class="hidden">
          <button id="closeQuickChat" class="btn-sm" style="margin-top:0.6rem;">Cerrar</button>
        </div>
      `;
      document.body.appendChild(overlay);
      const chatFileInput = overlay.querySelector('#chatFileInput');
      function load() {
        overlay.querySelector('#quickMsgBox').innerHTML = DB.messages[key].map(m => {
          let mediaHTML = '';
          if (m.media) {
            mediaHTML = m.media.type === 'image' ? `<img src="${m.media.url}" style="max-width:200px;border-radius:10px;">` : `<video controls style="max-width:200px;"><source src="${m.media.url}"></video>`;
          }
          return `<div style="text-align:${m.from===user.id?'right':'left'};"><span style="background:${m.from===user.id?'var(--accent)':'rgba(255,255,255,0.1)'};padding:0.5rem;border-radius:18px;display:inline-block;max-width:80%;">${mediaHTML}${m.text||''}</span></div>`;
        }).join('');
      }
      load();
      overlay.querySelector('#closeQuickChat').onclick = () => overlay.remove();
      overlay.querySelector('#quickSendMsg').onclick = () => {
        const t = overlay.querySelector('#quickMsgInput').value.trim();
        if (!t) return;
        DB.messages[key].push({ from: user.id, text: t, time: Date.now() });
        DB.save('messages'); load();
        overlay.querySelector('#quickMsgInput').value = '';
      };
      overlay.querySelector('#sendPhotoBtn').onclick = () => { chatFileInput.accept = 'image/*'; chatFileInput.click(); };
      overlay.querySelector('#sendVideoBtn').onclick = () => { chatFileInput.accept = 'video/*'; chatFileInput.click(); };
      chatFileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const dataUrl = await fileToBase64(file);
        DB.messages[key].push({ from: user.id, text: '', media: { type: file.type.startsWith('video')?'video':'image', url: dataUrl }, time: Date.now() });
        DB.save('messages'); load(); chatFileInput.value = '';
      };
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }

    function renderFriends(container) {
      const user = DB.users[DB.currentUser];
      container.innerHTML = `
        <div class="glass">
          <h3><span class="material-icons-round">person_search</span> Buscar</h3>
          <div style="display:flex;gap:0.4rem;margin:0.6rem 0;">
            <input id="searchUser" placeholder="Username o ID">
            <button id="searchBtn" class="btn-primary btn-sm"><span class="material-icons-round">search</span></button>
          </div>
          <div id="searchResult"></div>
        </div>
        <div class="glass">
          <h3><span class="material-icons-round">groups</span> Siguiendo (${user.following.length})</h3>
          ${user.following.map(id => {
            const f = getUser(id);
            return f ? `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;"><span>${f.displayName} (@${f.username})</span><button class="btn-danger btn-sm unfollow-btn" data-uid="${f.id}"><span class="material-icons-round">person_remove</span></button></div>` : '';
          }).join('') || '<p style="color:var(--text3);">No sigues a nadie</p>'}
        </div>
      `;
      document.getElementById('searchBtn').onclick = () => {
        const q = document.getElementById('searchUser').value.trim();
        const found = findByUsername(q) || getUser(q);
        const res = document.getElementById('searchResult');
        if (!found) { res.innerHTML = '<p style="color:var(--danger);">No encontrado</p>'; return; }
        if (found.id === user.id) { res.innerHTML = '<p>Eres tu</p>'; return; }
        const isF = user.following.includes(found.id);
        res.innerHTML = `<div style="display:flex;justify-content:space-between;padding:0.5rem;background:rgba(255,255,255,0.02);border-radius:12px;"><span>${found.displayName} (@${found.username})</span><button class="follow-btn ${isF?'following':''}" data-uid="${found.id}">${isF?'Siguiendo':'Seguir'}</button></div>`;
      };
      container.onclick = (e) => {
        const btn = e.target.closest('.follow-btn') || e.target.closest('.unfollow-btn');
        if (btn) { toggleFollow(btn.dataset.uid); renderFriends(container); }
      };
    }

    function renderProfile(container) {
      const user = DB.users[DB.currentUser];
      container.innerHTML = `
        <div class="glass" style="text-align:center;">
          <div class="avatar avatar-lg" style="margin:0 auto;">${user.avatarType==='image'?`<img src="${user.avatar}">`:user.avatar}</div>
          <h2>${user.displayName}</h2>
          <p>@${user.username}</p>
          <p>${user.email || ''}</p>
          <p>${user.bio || ''}</p>
          <div style="display:flex;justify-content:center;gap:2rem;margin:0.8rem 0;">
            <div class="topbar-stat"><span class="topbar-stat-value">${user.followers.length}</span><span class="topbar-stat-label">Seguidores</span></div>
            <div class="topbar-stat"><span class="topbar-stat-value">${user.following.length}</span><span class="topbar-stat-label">Siguiendo</span></div>
            <div class="topbar-stat"><span class="topbar-stat-value">${DB.posts.filter(p=>p.authorId===user.id).length}</span><span class="topbar-stat-label">Posts</span></div>
          </div>
          <div id="profileInfo">
            <button id="editProfileBtn" class="btn-primary"><span class="material-icons-round">edit</span> Editar perfil</button>
          </div>
          <div id="profileEditForm" class="hidden" style="text-align:left;">
            <input id="editDisplayName" value="${user.displayName}" placeholder="Nombre">
            <textarea id="editBio" rows="2">${user.bio||''}</textarea>
            <div style="display:flex;gap:0.5rem;margin:0.5rem 0;">
              <button id="changeAvatarFileBtn" class="btn-sm"><span class="material-icons-round">image</span> Subir foto</button>
              <input id="editAvatarLetter" placeholder="Letra/emoji" value="${user.avatarType==='text'?user.avatar:''}">
            </div>
            <input type="file" id="avatarFileInput" accept="image/*" class="hidden">
            <div id="avatarPreview"></div>
            <button id="saveProfileBtn" class="btn-primary" style="margin-top:0.5rem;">Guardar</button>
            <button id="cancelEditBtn" class="btn-sm">Cancelar</button>
          </div>
        </div>
      `;
      let newAvatarData = null;
      document.getElementById('editProfileBtn').onclick = () => {
        document.getElementById('profileInfo').classList.add('hidden');
        document.getElementById('profileEditForm').classList.remove('hidden');
      };
      document.getElementById('cancelEditBtn').onclick = () => {
        document.getElementById('profileEditForm').classList.add('hidden');
        document.getElementById('profileInfo').classList.remove('hidden');
      };
      document.getElementById('changeAvatarFileBtn').onclick = () => document.getElementById('avatarFileInput').click();
      document.getElementById('avatarFileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        newAvatarData = await fileToBase64(file);
        document.getElementById('avatarPreview').innerHTML = `<img src="${newAvatarData}" style="width:60px;height:60px;border-radius:50%;">`;
      };
      document.getElementById('saveProfileBtn').onclick = () => {
        user.displayName = document.getElementById('editDisplayName').value.trim() || user.displayName;
        user.bio = document.getElementById('editBio').value.trim();
        const letter = document.getElementById('editAvatarLetter').value.trim();
        if (newAvatarData) { user.avatar = newAvatarData; user.avatarType = 'image'; }
        else if (letter) { user.avatar = letter; user.avatarType = 'text'; }
        DB.save('users');
        renderProfile(container);
        document.getElementById('navAvatar').innerHTML = user.avatarType==='image'?`<img src="${user.avatar}">`:user.avatar;
      };
    }

    renderApp();
  })();
  </script>
</body>
</html>
